name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Use Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
